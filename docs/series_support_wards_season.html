<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<title>Ward Season — Heatmap</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c89b3c;--gold2:#f0d07a;--dark:#08090c;--panel:#0d1117;--panel2:#111820;
  --border:#1a2632;--border2:#243040;--text:#9ab0c0;--text2:#4a6070;
  --blue:#4fc3f7;--red:#ef5350;--green:#4caf50;--purple:#ce93d8;
  --yt:#ffd740;--cw:#29b6f6;--sw:#66bb6a;--kl:#ef5350;
}
html,body{height:100vh;width:100vw;overflow:hidden;background:var(--dark);color:var(--text);
  font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column;}
.hdr{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:5px 14px;
  border-bottom:1px solid var(--border);background:var(--panel);min-height:36px;}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:800;
  letter-spacing:4px;text-transform:uppercase;color:var(--gold2);}
.hdr-sub{font-family:'Share Tech Mono',monospace;font-size:.56rem;color:var(--text2);margin-left:4px;}
.tabs{display:flex;gap:3px;margin-left:auto;}
.tab{padding:3px 11px;border-radius:3px;cursor:pointer;border:1px solid var(--border2);
  background:transparent;color:var(--text2);font-family:'Barlow Condensed',sans-serif;
  font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  transition:all .15s;user-select:none;}
.tab.active{border-color:var(--gold);background:rgba(200,155,60,.08);color:var(--gold);}
.tab:hover:not(.active){background:var(--panel2);color:var(--text);}
.body{flex:1;min-height:0;display:flex;overflow:hidden;}
.sidebar{width:270px;flex-shrink:0;border-right:1px solid var(--border);
  background:var(--panel);display:flex;flex-direction:column;overflow:hidden;}
.sb-scroll{flex:1;overflow-y:auto;}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.54rem;font-weight:700;
  letter-spacing:4px;text-transform:uppercase;color:var(--text2);
  padding:6px 12px 3px;border-bottom:1px solid var(--border);background:var(--panel2);flex-shrink:0;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:7px;}
.stat-card{background:var(--panel2);border:1px solid var(--border2);border-radius:4px;
  padding:7px 9px;display:flex;flex-direction:column;gap:1px;}
.stat-card.accent{border-color:rgba(200,155,60,.3);}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;
  line-height:1;color:var(--gold2);}
.stat-num.g{color:var(--sw);} .stat-num.b{color:var(--cw);} .stat-num.y{color:var(--yt);}
.stat-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.52rem;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--text2);}
.stat-sub{font-family:'Share Tech Mono',monospace;font-size:.55rem;color:var(--text2);}
.side-toggle{display:flex;gap:4px;padding:6px 8px;border-bottom:1px solid var(--border);}
.sbtn{flex:1;padding:4px 0;border-radius:3px;cursor:pointer;border:1px solid var(--border2);
  background:transparent;color:var(--text2);font-family:'Barlow Condensed',sans-serif;
  font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  transition:all .12s;text-align:center;user-select:none;}
.sbtn.blue.active{border-color:var(--blue);background:rgba(79,195,247,.1);color:var(--blue);}
.sbtn.red.active{border-color:var(--red);background:rgba(239,83,80,.1);color:var(--red);}
.sbtn.both.active{border-color:var(--gold);background:rgba(200,155,60,.08);color:var(--gold);}
.sbtn:hover:not(.active){background:var(--panel2);}
.side-note{padding:4px 12px;font-family:'Share Tech Mono',monospace;font-size:.54rem;
  color:var(--text2);border-bottom:1px solid var(--border);}
.filter-wrap{padding:5px 7px;border-bottom:1px solid var(--border);
  display:flex;gap:3px;flex-wrap:wrap;}
.fbtn{padding:2px 8px;border-radius:3px;cursor:pointer;border:1px solid var(--border2);
  background:transparent;color:var(--text2);font-family:'Barlow Condensed',sans-serif;
  font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  transition:all .12s;display:flex;align-items:center;gap:3px;user-select:none;}
.fbtn.active{border-color:var(--gold);background:rgba(200,155,60,.08);color:var(--gold);}
.fbtn-dot{width:6px;height:6px;border-radius:50%;}
.zone-row{display:flex;align-items:center;gap:7px;padding:4px 12px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.zone-row:hover{background:var(--panel2);}
.zone-row.hl{background:rgba(200,155,60,.04);border-left:2px solid var(--gold);}
.zone-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.zone-name{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;font-weight:700;
  color:var(--text);flex:1;}
.zone-count{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--gold2);}
.zone-bar-wrap{width:45px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.zone-bar{height:100%;border-radius:2px;}
.timing-row{display:flex;align-items:center;gap:7px;padding:3px 12px;
  border-bottom:1px solid var(--border);}
.timing-lbl{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;color:var(--text);flex:1;}
.timing-val{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--gold2);}
.timing-bar-wrap{width:36px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.timing-bar{height:100%;border-radius:2px;background:var(--blue);}
.game-chip{display:flex;align-items:center;gap:6px;padding:4px 10px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.game-chip:hover{background:var(--panel2);}
.game-chip.active{background:rgba(200,155,60,.05);border-left:3px solid var(--gold);}
.gc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.gc-info{flex:1;display:flex;flex-direction:column;}
.gc-name{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;color:var(--gold2);}
.gc-meta{font-family:'Share Tech Mono',monospace;font-size:.54rem;color:var(--text2);}
.gc-side{font-family:'Barlow Condensed',sans-serif;font-size:.54rem;font-weight:700;
  padding:1px 4px;border-radius:2px;}
.gc-side.blue{background:rgba(79,195,247,.1);color:var(--blue);border:1px solid rgba(79,195,247,.2);}
.gc-side.red{background:rgba(239,83,80,.1);color:var(--red);border:1px solid rgba(239,83,80,.2);}
.map-area{flex:1;min-width:0;position:relative;background:#050708;overflow:hidden;}
canvas{position:absolute;inset:0;width:100%;height:100%;}
.map-ctrls{position:absolute;top:8px;right:10px;display:flex;flex-direction:column;gap:3px;}
.mc-btn{padding:3px 9px;border-radius:3px;cursor:pointer;border:1px solid var(--border2);
  background:rgba(13,17,23,.88);color:var(--text2);font-family:'Barlow Condensed',sans-serif;
  font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  transition:all .12s;backdrop-filter:blur(4px);user-select:none;}
.mc-btn.active{border-color:var(--gold);color:var(--gold);}
.mc-btn:hover:not(.active){color:var(--text);}
.side-badge{position:absolute;top:8px;left:10px;background:rgba(13,17,23,.88);
  border:1px solid var(--border2);border-radius:4px;padding:3px 9px;
  font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;backdrop-filter:blur(4px);}
.legend{position:absolute;bottom:8px;right:10px;background:rgba(13,17,23,.9);
  border:1px solid var(--border2);border-radius:4px;padding:7px 11px;
  display:flex;flex-direction:column;gap:4px;backdrop-filter:blur(4px);}
.leg-item{display:flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;
  font-size:.65rem;color:var(--text);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
#tooltip{position:fixed;background:rgba(8,9,12,.95);border:1px solid var(--border2);
  border-radius:4px;padding:5px 9px;font-family:'Share Tech Mono',monospace;font-size:.63rem;
  color:var(--text);pointer-events:none;z-index:200;display:none;max-width:210px;line-height:1.6;}
</style></head><body>
<div class="hdr">
  <span class="hdr-title">👁 WARDS SEASON</span>
  <span class="hdr-sub" id="hdrSub">LOADING...</span>
  <div class="tabs" id="gameTabs"></div>
</div>
<div class="body">
  <div class="sidebar">
    <div class="sec-lbl" id="statsLbl">SEASON STATS</div>
    <div class="stat-grid" id="statGrid"></div>
    <div class="sec-lbl">PERSPECTIVA</div>
    <div class="side-toggle">
      <div class="sbtn both active" onclick="setSide('both')">AMBOS</div>
      <div class="sbtn blue" onclick="setSide('blue')">BLUE</div>
      <div class="sbtn red" onclick="setSide('red')">RED</div>
    </div>
    <div class="side-note" id="sideNote">Mostrando todos los juegos sin espejo</div>
    <div class="filter-wrap" id="filterWrap"></div>
    <div class="sec-lbl">BREAKDOWN POR ZONA</div>
    <div id="zoneList"></div>
    <div class="sec-lbl">PRIMER WARD POR GAME</div>
    <div id="timingList"></div>
    <div class="sec-lbl">GAMES</div>
    <div class="sb-scroll" id="gameList"></div>
  </div>
  <div class="map-area" id="mapArea">
    <canvas id="mapCanvas"></canvas>
    <canvas id="heatCanvas"></canvas>
    <canvas id="wardCanvas"></canvas>
    <div class="map-ctrls">
      <div class="mc-btn active" id="btnDots" onclick="setMode('dots')">PUNTOS</div>
      <div class="mc-btn" id="btnHeat" onclick="setMode('heat')">HEATMAP</div>
      <div class="mc-btn" id="btnZones" onclick="toggleZones()">ZONAS</div>
    </div>
    <div class="side-badge" id="sideBadge" style="display:none"></div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--yt)"></div>Trinket</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--sw)"></div>Sight</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--cw)"></div>Control</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--kl);opacity:.7"></div>Killed</div>
    </div>
  </div>
</div>
<div id="tooltip"></div>

const MAP_SIZE = 15000;
const ZONES = [
  {id:'baron',   label:'Baron Pit',   color:'#ab47bc',x1:3500,z1:9500, x2:6000, z2:12500},
  {id:'dragon',  label:'Dragon Pit',  color:'#ff7043',x1:7800,z1:4800, x2:10800,z2:7200 },
  {id:'river_t', label:'River Top',   color:'#4fc3f7',x1:3500,z1:7500, x2:8000, z2:10000},
  {id:'river_b', label:'River Bot',   color:'#f06292',x1:7000,z1:2500, x2:11500,z2:5500 },
  {id:'blue_jg', label:'Blue Jungle', color:'#29b6f6',x1:1000,z1:5000, x2:7000, z2:9500 },
  {id:'red_jg',  label:'Red Jungle',  color:'#ef5350',x1:8000,z1:5500, x2:14000,z2:10000},
  {id:'top',     label:'Top Lane',    color:'#66bb6a',x1:700, z1:10000,x2:4500, z2:14800},
  {id:'bot',     label:'Bot Lane',    color:'#ffd740',x1:10500,z1:700, x2:14800,z2:4800 },
  {id:'mid',     label:'Mid Lane',    color:'#ce93d8',x1:5500,z1:5500, x2:9500, z2:9500 },
];

let currentGame='all', wardFilter='all', sideFilter='both';
let mapMode='dots', showZones=false, hoveredZone=null, mapImg=null;

const mapCanvas=document.getElementById('mapCanvas');
const heatCanvas=document.getElementById('heatCanvas');
const wardCanvas=document.getElementById('wardCanvas');
const mapCtx=mapCanvas.getContext('2d');
const heatCtx=heatCanvas.getContext('2d');
const wardCtx=wardCanvas.getContext('2d');

// No normalization: coords stay in original map space regardless of side.
function norm(x, z, side) {
  return [x, z];
}
function w2c(x, z, canvas) {
  return [x/MAP_SIZE*canvas.width, (1-z/MAP_SIZE)*canvas.height];
}

function getFilteredGames() {
  return SD.games.filter(g => {
    if (currentGame!=='all' && (g._global_idx!==undefined?g._global_idx:g.game_num)!==currentGame) return false;
    // Solo aplicar filtro de side en vista "all" — si hay un juego concreto seleccionado, mostrarlo siempre
    if (currentGame==='all' && sideFilter!=='both' && (g.side||'blue')!==sideFilter) return false;
    return true;
  });
}
function getWards() {
  const wards=[];
  for (const g of getFilteredGames()) {
    const side=g.side||'blue';
    for (const w of g.wards) {
      const [nx,nz]=norm(w.x,w.z,side);
      wards.push({...w,nx,nz,side,game_num:g.game_num,game_color:g.game_color});
    }
  }
  return filterWards(wards);
}
function filterWards(wards) {
  return wards.filter(w=>{
    if(wardFilter==='all')     return true;
    if(wardFilter==='control') return w.ward_type==='control';
    if(wardFilter==='stealth') return w.ward_type==='sight';
    if(wardFilter==='trinket') return w.ward_type==='yellowTrinket'||w.ward_type==='blueTrinket';
    if(wardFilter==='killed')  return !w.survived;
    return true;
  });
}
function wardColor(w) {
  if(!w.survived)                   return '#ef5350';
  if(w.ward_type==='control')       return '#29b6f6';
  if(w.ward_type==='yellowTrinket'||w.ward_type==='blueTrinket') return '#ffd740';
  return '#66bb6a';
}

function resizeCanvases() {
  const wrap=document.getElementById('mapArea');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  [mapCanvas,heatCanvas,wardCanvas].forEach(c=>{
    c.width=W*devicePixelRatio; c.height=H*devicePixelRatio;
    c.style.width=W+'px'; c.style.height=H+'px';
  });
  drawAll();
}

function drawMap() {
  const W=mapCanvas.width,H=mapCanvas.height;
  mapCtx.clearRect(0,0,W,H);
  mapCtx.fillStyle='#060809'; mapCtx.fillRect(0,0,W,H);
  if (mapImg) {
    mapCtx.drawImage(mapImg,0,0,W,H);
    mapCtx.fillStyle='rgba(0,0,0,.42)'; mapCtx.fillRect(0,0,W,H);
  }
  if (showZones) {
    for (const z of ZONES) {
      const [x1,y1]=w2c(z.x1,z.z2,mapCanvas);
      const [x2,y2]=w2c(z.x2,z.z1,mapCanvas);
      const col=z.color;
      const isH=hoveredZone===z.id;
      const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
      mapCtx.strokeStyle=col; mapCtx.lineWidth=isH?1.8*devicePixelRatio:0.8*devicePixelRatio;
      mapCtx.setLineDash([4,3]); mapCtx.strokeRect(x1,y1,x2-x1,y2-y1); mapCtx.setLineDash([]);
      mapCtx.fillStyle=`rgba(${r},${g},${b},${isH?.16:.05})`; mapCtx.fillRect(x1,y1,x2-x1,y2-y1);
      mapCtx.font=`bold ${6.5*devicePixelRatio}px "Barlow Condensed",sans-serif`;
      mapCtx.fillStyle=isH?col:`rgba(${r},${g},${b},.65)`;
      mapCtx.fillText(z.label,x1+3*devicePixelRatio,y1+9*devicePixelRatio);
    }
  }
}

function drawHeatmap() {
  const W=heatCanvas.width,H=heatCanvas.height;
  heatCtx.clearRect(0,0,W,H);
  if(mapMode!=='heat') return;
  const wards=getWards();
  if(!wards.length) return;
  const sigma=11;
  const sig2=2*sigma*sigma;
  const r=sigma*4;
  const buf=new Float32Array(W*H);
  wards.forEach(w=>{
    const[cx,cz]=w2c(w.nx,w.nz,heatCanvas);
    const x0=Math.max(0,Math.floor(cx-r)),x1=Math.min(W-1,Math.ceil(cx+r));
    const y0=Math.max(0,Math.floor(cz-r)),y1=Math.min(H-1,Math.ceil(cz+r));
    for(let y=y0;y<=y1;y++){for(let x=x0;x<=x1;x++){
      const dx=x-cx,dy=y-cz,d2=dx*dx+dy*dy;
      if(d2<r*r) buf[y*W+x]+=Math.exp(-d2/sig2);
    }}
  });
  const nonzero=[];
  for(let i=0;i<buf.length;i++) if(buf[i]>0) nonzero.push(buf[i]);
  nonzero.sort((a,b)=>a-b);
  const maxV=nonzero.length ? nonzero[Math.floor(nonzero.length*0.90)] : 0;
  if(maxV===0) return;
  const out=heatCtx.createImageData(W,H);
  for(let i=0;i<buf.length;i++){
    if(buf[i]===0){out.data[i*4+3]=0;continue;}
    const v=Math.min(buf[i]/maxV,1);
    let rr,gg,bb,aa;
    if(v<0.25){const t=v/0.25;rr=0;gg=Math.round(60*t);bb=Math.round(160+40*t);aa=Math.round(2+5*t);}
    else if(v<0.5){const t=(v-0.25)/0.25;rr=Math.round(20*t);gg=Math.round(60+100*t);bb=Math.round(200-140*t);aa=Math.round(7+9*t);}
    else if(v<0.75){const t=(v-0.5)/0.25;rr=Math.round(20+180*t);gg=Math.round(160+40*t);bb=Math.round(60-60*t);aa=Math.round(15+12*t);}
    else{const t=(v-0.75)/0.25;rr=220;gg=Math.round(200-160*t);bb=0;aa=Math.round(28+22*t);}
    const pi=i*4;
    out.data[pi]=rr;out.data[pi+1]=gg;out.data[pi+2]=bb;out.data[pi+3]=Math.min(255,aa);
  }
  const tmp=document.createElement('canvas');tmp.width=W;tmp.height=H;
  tmp.getContext('2d').putImageData(out,0,0);
  heatCtx.globalAlpha=1.0;heatCtx.drawImage(tmp,0,0);heatCtx.globalAlpha=1;
}

function drawWards() {
  const W=wardCanvas.width,H=wardCanvas.height;
  wardCtx.clearRect(0,0,W,H);
  if(mapMode!=='dots') return;
  const wards=getWards();
  const r=Math.max(3.5,W*.004)*devicePixelRatio;
  const multi=currentGame==='all'&&getFilteredGames().length>1;
  for(const w of wards) {
    const [wx,wy]=w2c(w.nx,w.nz,wardCanvas);
    const col=wardColor(w);
    wardCtx.shadowBlur=7*devicePixelRatio; wardCtx.shadowColor=col;
    wardCtx.beginPath(); wardCtx.arc(wx,wy,r,0,Math.PI*2);
    wardCtx.fillStyle=col; wardCtx.fill(); wardCtx.shadowBlur=0;
    wardCtx.strokeStyle='rgba(0,0,0,.55)'; wardCtx.lineWidth=.8*devicePixelRatio; wardCtx.stroke();
    if(multi&&w.game_color) {
      wardCtx.beginPath(); wardCtx.arc(wx,wy,r+1.8*devicePixelRatio,0,Math.PI*2);
      wardCtx.strokeStyle=w.game_color+'99'; wardCtx.lineWidth=1.5*devicePixelRatio; wardCtx.stroke();
    }
  }
}

function drawAll() { drawMap(); drawHeatmap(); drawWards(); }

function buildStats() {
  const games=getFilteredGames();
  const mode=sideFilter==='both'?'ALL SIDES':sideFilter.toUpperCase()+' SIDE';
  const selGame=currentGame!=='all'?SD.games.find(g=>(g._global_idx!==undefined?g._global_idx:g.game_num)===currentGame):null;
  document.getElementById('statsLbl').textContent=
    currentGame==='all'?`SEASON — ${SD.total_games}G · ${mode}`:`G${selGame?selGame.game_num:currentGame}${selGame&&selGame._series_label?' · '+selGame._series_label:''}`;
  let total=0,ctrl=0,stealth=0,trinket=0,killed=0;
  for(const g of games){
    total+=g.ward_summary.total_placed; killed+=g.ward_summary.total_killed;
    ctrl+=(g.ward_summary.by_type.control||0);
    trinket+=((g.ward_summary.by_type.yellowTrinket||0)+(g.ward_summary.by_type.blueTrinket||0));
    stealth+=(g.ward_summary.by_type.sight||0);
  }
  const avg=games.length?(total/games.length).toFixed(1):0;
  document.getElementById('statGrid').innerHTML=`
    <div class="stat-card accent"><span class="stat-num">${total}</span>
      <span class="stat-lbl">Total Wards</span><span class="stat-sub">${avg}/game</span></div>
    <div class="stat-card"><span class="stat-num g">${total-killed}</span>
      <span class="stat-lbl">Survived</span><span class="stat-sub">${killed} killed</span></div>
    <div class="stat-card"><span class="stat-num b">${total?Math.round(ctrl/total*100):0}%</span>
      <span class="stat-lbl">Control</span><span class="stat-sub">${ctrl} placed</span></div>
    <div class="stat-card"><span class="stat-num y">${total?Math.round(trinket/total*100):0}%</span>
      <span class="stat-lbl">Trinket</span><span class="stat-sub">${stealth} sight</span></div>`;
  buildTiming(games);
}

function buildTiming(games) {
  const el=document.getElementById('timingList');
  if(!games.length){el.innerHTML='';return;}
  const rows=games.map(g=>({gn:g.game_num,champ:g.champion_name,side:g.side||'blue',
    ms:g.wards.reduce((mn,w)=>w.game_time_ms<mn?w.game_time_ms:mn,Infinity)}));
  const maxMs=Math.max(...rows.map(r=>r.ms));
  el.innerHTML=rows.map(r=>{
    const pct=maxMs?Math.round(r.ms/maxMs*100):0;
    const col=r.side==='blue'?'var(--blue)':'var(--red)';
    return `<div class="timing-row">
      <span class="timing-lbl" style="color:${col}">G${r.gn} ${r.champ}</span>
      <span class="timing-val">${mmss(r.ms)}</span>
      <div class="timing-bar-wrap"><div class="timing-bar" style="width:${100-pct}%"></div></div>
    </div>`;
  }).join('');
}

function buildZones() {
  const wards=getWards();
  const counts={};
  for(const z of ZONES) counts[z.id]=0;
  let other=0;
  for(const w of wards){
    let found=false;
    for(const z of ZONES){
      if(w.nx>=z.x1&&w.nx<=z.x2&&w.nz>=z.z1&&w.nz<=z.z2){counts[z.id]++;found=true;break;}
    }
    if(!found) other++;
  }
  const maxC=Math.max(...Object.values(counts),1);
  document.getElementById('zoneList').innerHTML=ZONES.map(z=>{
    const cnt=counts[z.id],pct=Math.round(cnt/maxC*100);
    return `<div class="zone-row${hoveredZone===z.id?' hl':''}"
      onmouseenter="hoverZone('${z.id}')" onmouseleave="hoverZone(null)">
      <div class="zone-dot" style="background:${z.color}"></div>
      <span class="zone-name">${z.label}</span>
      <span class="zone-count">${cnt}</span>
      <div class="zone-bar-wrap"><div class="zone-bar" style="width:${pct}%;background:${z.color}"></div></div>
    </div>`;
  }).join('')+(other?`<div class="zone-row"><div class="zone-dot" style="background:var(--text2)"></div>
    <span class="zone-name">Otro</span><span class="zone-count">${other}</span>
    <div class="zone-bar-wrap"></div></div>`:'');
}

function buildFilters() {
  const filters=[
    {id:'all',lbl:'Todas',col:'var(--text)'},{id:'control',lbl:'Control',col:'var(--cw)'},
    {id:'stealth',lbl:'Sight',col:'var(--sw)'},{id:'trinket',lbl:'Trinket',col:'var(--yt)'},
    {id:'killed',lbl:'Killed',col:'var(--kl)'},
  ];
  document.getElementById('filterWrap').innerHTML=filters.map(f=>
    `<div class="fbtn${wardFilter===f.id?' active':''}" onclick="setFilter('${f.id}')">
      <div class="fbtn-dot" style="background:${f.col}"></div>${f.lbl}</div>`
  ).join('');
}

function buildGameList() {
  // Use _global_idx as unique ID when available (season/multi-series view),
  // fall back to game_num for standalone single-series HTML.
  function gid(g){ return g._global_idx!==undefined ? g._global_idx : g.game_num; }
  const items=[
    {id:'all',label:'Season',meta:`${SD.total_games} games`,color:'var(--gold)',side:'both'},
    ...SD.games.map(g=>({id:gid(g),gameNum:g.game_num,label:`G${g.game_num} — ${g.champion_name}`,
      meta:`${g.player_name} · ${g.ward_summary.total_placed}w`,
      color:g.game_color,side:g.side||'blue',series:g._series_label||''}))
  ];
  document.getElementById('gameList').innerHTML=items.map(item=>{
    const sideTag=item.id!=='all'?`<span class="gc-side ${item.side}">${item.side.toUpperCase()}</span>`:'';
    return `<div class="game-chip${currentGame===item.id?' active':''}"
      onclick="selectGame(${JSON.stringify(item.id)})">
      <div class="gc-dot" style="background:${item.color};box-shadow:0 0 5px ${item.color}55"></div>
      <div class="gc-info"><span class="gc-name">${item.label}</span>
        <span class="gc-meta">${item.meta}${item.series?` · ${item.series}`:''}</span></div>
      ${sideTag}</div>`;
  }).join('');
  document.getElementById('gameTabs').innerHTML=
    [{id:'all',lbl:'ALL'},...SD.games.map(g=>({id:gid(g),lbl:`G${g.game_num}`}))].map(item=>{
      return `<div class="tab${currentGame===item.id?' active':''}"
        onclick="selectGame(${JSON.stringify(item.id)})">${item.lbl}</div>`;
    }).join('');
}

function updateSideBadge() {
  const badge=document.getElementById('sideBadge');
  const note=document.getElementById('sideNote');
  if(sideFilter==='both'){
    badge.style.display='none';
    note.textContent='Mostrando todos los juegos (blue + red)';
    return;
  }
  badge.style.display='block';
  const col=sideFilter==='blue'?'#4fc3f7':'#ef5350';
  badge.style.color=col; badge.style.borderColor=col+'55';
  if(sideFilter==='blue'){
    badge.textContent='BLUE SIDE — heatmap acumulado';
    note.textContent='Todos los juegos de blue side superpuestos';
  } else {
    badge.textContent='RED SIDE — heatmap acumulado';
    note.textContent='Todos los juegos de red side superpuestos';
  }
}

function selectGame(id){currentGame=id;buildAll();drawAll();}
function setFilter(f){wardFilter=f;buildFilters();buildZones();drawAll();}
function setSide(s){
  sideFilter=s;
  // Resetear currentGame a 'all' al cambiar de perspectiva para evitar
  // que quede seleccionado un juego que ya no aparece en la vista filtrada
  currentGame='all';
  // Auto-activar heatmap al seleccionar blue/red (vista acumulada por side),
  // volver a dots al poner AMBOS
  if(s!=='both' && mapMode!=='heat'){
    mapMode='heat';
    document.getElementById('btnDots').classList.remove('active');
    document.getElementById('btnHeat').classList.add('active');
  } else if(s==='both' && mapMode==='heat'){
    mapMode='dots';
    document.getElementById('btnDots').classList.add('active');
    document.getElementById('btnHeat').classList.remove('active');
  }
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.toggle('active',b.classList.contains(s)));
  updateSideBadge();buildAll();drawAll();
}
function setMode(m){
  mapMode=m;
  document.getElementById('btnDots').classList.toggle('active',m==='dots');
  document.getElementById('btnHeat').classList.toggle('active',m==='heat');
  drawAll();
}
function toggleZones(){
  showZones=!showZones;
  document.getElementById('btnZones').classList.toggle('active',showZones);
  buildZones();drawAll();
}
function hoverZone(id){hoveredZone=id;buildZones();if(showZones)drawMap();}
function buildAll(){buildStats();buildFilters();buildZones();buildGameList();}

const tooltip=document.getElementById('tooltip');
function handleMove(e,canvas){
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*devicePixelRatio,my=(e.clientY-rect.top)*devicePixelRatio;
  const wards=getWards();
  const r=Math.max(8,canvas.width*.006)*devicePixelRatio;
  let found=null;
  for(const w of wards){
    const [wx,wy]=w2c(w.nx,w.nz,canvas);
    if(Math.hypot(mx-wx,my-wy)<r){found=w;break;}
  }
  if(found){
    const tl={yellowTrinket:'Yellow Trinket',blueTrinket:'Blue Trinket',
      control:'Control Ward',sight:'Sight Ward'}[found.ward_type]||found.ward_type;
    tooltip.innerHTML=`<b style="color:${wardColor(found)}">${tl}</b><br>`+
      `Placed: ${found.time_str}<br>`+
      `${found.killed_str?`Killed: ${found.killed_str} (${found.duration_str})`:'Active'}`+
      `${found.killed_by_name?'<br>By: '+found.killed_by_name:''}`+
      `<br>G${found.game_num} · ${(found.side||'?').toUpperCase()} SIDE`;
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+14)+'px';tooltip.style.top=(e.clientY-10)+'px';
  } else tooltip.style.display='none';
}
wardCanvas.addEventListener('mousemove',e=>handleMove(e,wardCanvas));
wardCanvas.addEventListener('mouseleave',()=>tooltip.style.display='none');
heatCanvas.addEventListener('mousemove',e=>handleMove(e,wardCanvas));
heatCanvas.addEventListener('mouseleave',()=>tooltip.style.display='none');

function mmss(ms){
  if(!ms||!isFinite(ms))return'—';
  const s=Math.floor(ms/1000);
  return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}

(async()=>{
  const sub = document.getElementById('hdrSub');
  try {
    sub.textContent = 'CARGANDO...';
    let resp = null;
    try { resp = await fetch('http://localhost:5000/api/ward-season'); if (!resp.ok) resp = null; } catch(_) {}
    if (!resp) { resp = await fetch('./ward_season_data.json'); }
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    SD = await resp.json();
    if (!SD.games || !SD.games.length) throw new Error('Sin games en la respuesta');
    sub.textContent = `${SD.total_games} GAMES · ${SD.total_series} SERIES`;
  } catch(e) {
    sub.textContent = `ERROR: ${e.message}`;
    sub.style.color = 'var(--red)';
    return;
  }

  if(MAP_B64){
    mapImg=await new Promise(resolve=>{
      const img=new Image();img.onload=()=>resolve(img);img.onerror=()=>resolve(null);img.src=MAP_B64;
    });
  }
  buildAll();updateSideBadge();
  const ro=new ResizeObserver(resizeCanvases);
  ro.observe(document.getElementById('mapArea'));
  resizeCanvases();
})();
window.addEventListener('resize',resizeCanvases);
</script></body></html>
